<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
    font-size:32px;
}

.question{
    font-size:28px;
    font-weight:bold;
    margin:30px 0;
    min-height:100px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

select{
    width:80%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:#007bff;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    min-height:60px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday My Love ❤️</h1>

    <div class="question" id="question"></div>

    <select id="answerSelect" onchange="showMessage()">
        <option value="">Select Yes / No ❤️</option>
        <option value="yes">Yes 💚</option>
        <option value="no">No 😜</option>
    </select>

    <br>

    <button onclick="submitAnswer()">Submit ❤️</button>

    <div id="message"></div>
</div>

<script>
const questions = [
{
question:"Do you think I’m the best husband ever?",
yes:"I knew you had great taste ❤️😎",
no:"Oops... looks like I need extra husband training 😂"
},
{
question:"Will you love me forever?",
yes:"Best birthday gift ever 💖",
no:"Too late... lifetime contract already signed 😜"
},
{
question:"Am I your favorite person?",
yes:"As expected 😌❤️",
no:"Should I start being jealous now? 👀😂"
},
{
question:"Will you be my forever birthday queen?",
yes:"Always and forever 👑❤️",
no:"I’ll keep campaigning until I win 😂"
}
];

let currentQuestion = 0;

function loadQuestion(){
    document.getElementById("question").innerText = questions[currentQuestion].question;
    document.getElementById("message").innerText = "";
    document.getElementById("answerSelect").value = "";
}

function showMessage(){
    const selectedAnswer = document.getElementById("answerSelect").value;
    
    if(selectedAnswer !== ""){
        document.getElementById("message").innerText = 
            questions[currentQuestion][selectedAnswer];
    }
}

function submitAnswer(){
    const selectedAnswer = document.getElementById("answerSelect").value;

    if(selectedAnswer === ""){
        alert("Please select Yes or No first ❤️");
        return;
    }

    currentQuestion++;

    if(currentQuestion < questions.length){
        loadQuestion();
    }else{
        document.querySelector(".container").innerHTML = `
            <h1>🎉 Happy Birthday My Queen 👑❤️</h1>
            <p style="font-size:24px;margin-top:20px;">
            Thank you for being my wife, my happiness,
            and my forever love ❤️
            </p>
        `;
    }
}

loadQuestion();
</script>

</body>
</html>
