<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
    font-size:32px;
}

.question{
    font-size:28px;
    font-weight:bold;
    margin:30px 0;
    min-height:100px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

select{
    width:80%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:#007bff;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    min-height:60px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday My Love ❤️</h1>

    <div class="question" id="question"></div>

    <select id="answerSelect" onchange="showMessage()">
        <option value="">Select Yes / No ❤️</option>
        <option value="yes">Yes 💚</option>
        <option value="no">No 😜</option>
    </select>

    <br>

    <button onclick="submitAnswer()">Submit ❤️</button>

    <div id="message"></div>
</div>

<script>
const questions = [
{
question:"Do you think I’m the luckiest husband alive?",
yes:"Absolutely true ❤️",
no:"Excuse me? Retry your answer 😏"
},
{
question:"Will you love me forever?",
yes:"That’s all I wanted to hear 💖",
no:"Too late… lifetime subscription already activated 😂"
},
{
question:"Am I your favorite person?",
yes:"As expected 😎❤️",
no:"Who is competing with me? Tell me now 👀"
},
{
question:"Can I steal your birthday cake?",
yes:"That’s true love 🍰❤️",
no:"Cake over husband? I’ll remember this 😂"
},
{
question:"Do you still get butterflies when you see me?",
yes:"Mission successful 😍",
no:"I’ll upgrade my style soon 😎"
},
{
question:"Are you happy being my wife?",
yes:"That makes me the happiest husband ❤️",
no:"Wait… let me fix this with gifts 🎁😂"
},
{
question:"Am I handsome?",
yes:"I knew it 😌🔥",
no:"Your eyesight needs checking 😜"
},
{
question:"Do you think our baby got cuteness from me?",
yes:"Obviously my genes 😎👶",
no:"Wow… complete betrayal 😂"
},
{
question:"Should I buy you more gifts?",
yes:"Correct answer 🎁❤️",
no:"That sounds suspicious 🤨😂"
},
{
question:"Am I your permanent headache?",
yes:"At least I’m permanent 😎",
no:"That means I need to annoy you more 😂"
},
{
question:"Will you always be my queen?",
yes:"Forever and always 👑❤️",
no:"Application rejected… but I’ll try again 😂"
},
{
question:"Do you know you’re the best gift in my life?",
yes:"And today we celebrate YOU ❤️🎂",
no:"Wrong answer… birthday girl gets one retry 😜"
},
{
question:"Should we go on more adventures together?",
yes:"Pack your bags ❤️✈️",
no:"Adventure starts anyway 😂"
},
{
question:"Can I annoy you forever?",
yes:"That’s real love 😂❤️",
no:"Too late… no refund policy 😎"
},
{
question:"Are you the cutest mommy?",
yes:"Our little boy agrees 👶❤️",
no:"Baby disagrees with you 😂"
}
];

let currentQuestion = 0;

function loadQuestion(){
    document.getElementById("question").innerText =
        questions[currentQuestion].question;

    document.getElementById("message").innerText = "";
    document.getElementById("answerSelect").value = "";
}

function showMessage(){
    const selectedAnswer =
        document.getElementById("answerSelect").value;

    if(selectedAnswer !== ""){
        document.getElementById("message").innerText =
            questions[currentQuestion][selectedAnswer];
    }
}

function submitAnswer(){
    const selectedAnswer =
        document.getElementById("answerSelect").value;

    if(selectedAnswer === ""){
        alert("Please select Yes or No first ❤️");
        return;
    }

    currentQuestion++;

    if(currentQuestion < questions.length){
        loadQuestion();
    } else {
        document.querySelector(".container").innerHTML = `
            <h1>🎉 Happy Birthday My Queen 👑❤️</h1>
            <p style="font-size:24px;margin-top:20px;">
            Thank you for being my wife, my happiness,
            our baby’s amazing mommy, and my forever love ❤️👶
            </p>
        `;
    }
}

loadQuestion();
</script>

</body>
</html>
